        caro.fastpitch_batch_size: 16
        caro.fastpitch_epochs: 50
        caro.fastpitch_max_dur: 13
        caro.fastpitch_peak_lr: 0.0001
        caro.fastpitch_pretrained_init_arg: 
          +init_from_nemo_model=../pretrained_models/FemaleFastpitchHUI_44100.nemo
        caro.log_dir: ../trained_pipelines/caro
        caro.sup_data_path: ../data/caromopfen/fastpitch_sup_data
        caro.train_manifest_path: ../data/caromopfen/train_manifest.jsonl
        caro.val_manifest_path: ../data/caromopfen/val_manifest.jsonl
