      ../trained_pipelines/caro/fastpitch/checkpoints/FastPitch.nemo 
      --input-json-manifests ../data/caromopfen/train_manifest.jsonl 
      ../data/caromopfen/val_manifest.jsonl --output-json-manifest-root 
