schema: '2.0'
stages:
  train_fastpitch_caro:
    cmd: python train_fastpitch.py --config-path configs --config-name 
      train_config_fastpitch log_dir=../trained_pipelines/caro/fastpitch 
      train_manifest=../data/caromopfen/train_manifest.jsonl 
      validation_manifest=../data/caromopfen/val_manifest.jsonl 
      sup_data_path=../data/caromopfen/fastpitch_sup_data max_duration=12 
      batch_size=16 model.optim.lr=1e-05 trainer.max_epochs=2 
      +init_from_pretrained_model._.name=tts_de_fastpitch_multispeaker_5 
      +init_from_pretrained_model._.exclude=['fastpitch.encoder.word_emb.weight']
    deps:
    - path: configs/train_config_fastpitch.yaml
      hash: md5
      md5: 018859253c8c6e6937ef7e9d8938aa5c
      size: 6172
    params:
      params.yaml:
        caro.fastpitch_batch_size: 16
        caro.fastpitch_epochs: 2
        caro.fastpitch_max_dur: 12
        caro.fastpitch_peak_lr: 1e-05
        caro.fastpitch_pretrained_init_arg: 
          +init_from_pretrained_model._.name=tts_de_fastpitch_multispeaker_5 
          +init_from_pretrained_model._.exclude=['fastpitch.encoder.word_emb.weight']
        caro.sup_data_path: ../data/caromopfen/fastpitch_sup_data
        caro.train_manifest_path: ../data/caromopfen/train_manifest.jsonl
        caro.tts_log_dir: ../trained_pipelines/caro/fastpitch
        caro.val_manifest_path: ../data/caromopfen/val_manifest.jsonl
    outs:
    - path: ../data/caromopfen/fastpitch_sup_data
      hash: md5
      md5: d751713988987e9331980363e24189ce.dir
      size: 0
      nfiles: 0
    - path: ../trained_pipelines/caro/fastpitch
      hash: md5
      md5: 42b2cc86594c5b41bc0b058840ff0e3b.dir
      size: 1817601215
      nfiles: 10
  'download_caro_hui_data:':
    cmd: python prepare_hui_data.py --speaker caromopfen --data-folder ../data
    outs:
    - path: ../data/caromopfen/caromopfen
      hash: md5
      md5: 175da1f6bf096676361414cd80be1410.dir
      size: 657992024
      nfiles: 945
    - path: ../data/caromopfen/train_manifest.jsonl
      hash: md5
      md5: 3526ae7fdea40abe245aa1048f5ff170
